<!DOCTYPE html>
<html>
<head>
    <title>Java - Course</title>
    
    <style>
        .modules-container {
            background: #f9f9f9;
            border-radius: 12px;
            border: 3px solid #ed8936;
            max-height: 600px;
            overflow-y: auto;
            padding: 15px;
        }
        .module-card {
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        .module-header {
            background: #ed8936;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .module-header:hover {
            background: #d17a00;
        }
        .toggle-icon {
            font-size: 18px;
            transition: transform 0.3s;
        }
        .lessons-container {
            padding: 10px;
        }
        .lesson-btn {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 5px;
            background: white;
            border: 2px solid #ed8936;
            color: #ed8936;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: left;
        }
        .lesson-btn:hover {
            background: #ed8936;
            color: white;
        }
        .lesson-btn.completed {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .progress-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ed8936, #f59e0b);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-weight: bold;
        }
        .lesson-display {
            background: white;
            border-radius: 8px;
            padding: 25px;
            border-left: 5px solid #ed8936;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 500px;
        }
        .subscribe-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .subscribe-btn:hover {
            background: #218838;
        }
        /* Payment Modal Styles */
        .payment-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .payment-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ed8936;
            padding-bottom: 15px;
        }
        .modal-header h2 {
            color: #ed8936;
            margin: 0;
        }
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #000;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .payment-methods {
            margin-bottom: 20px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .payment-method input {
            margin-right: 10px;
            width: auto;
        }
        .payment-method.selected {
            border-color: #ed8936;
            background: #fff7f0;
        }
        .pay-button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .pay-button:hover {
            background: #218838;
        }
        .price-display {
            text-align: center;
            font-size: 18px;
            color: #ed8936;
            margin-bottom: 20px;
            padding: 15px;
            background: #fff7f0;
            border-radius: 5px;
        }
        .price-display strong {
            font-size: 24px;
        }
    </style>
</head>
<body class="bg-light">

<!-- HEADER -->
<header class="subject-header" style="background: linear-gradient(135deg, #ed8936 0%, #c05621 100%);">
    <div class="header-container">
        <div class="header-left">
            <h3 class="academic-name">☕ Java Programming</h3>
        </div>
        <div class="header-right">
            <button class="subscribe-btn" onclick="openPaymentModal()">Enroll Now</button>
            <a href="/dashboard" class="btn btn-light" style="margin-left: 10px;">← Back</a>
        </div>
    </div>
</header>

<!-- CONTENT -->
<div class="container mt-5 mb-5">
    <!-- Progress Bar -->
    <div class="progress mb-4" style="height: 25px;">
        <div class="progress-bar bg-success" role="progressbar" style="width: 0%;" id="progressBar"></div>
    </div>
    <div class="text-center mb-3" id="progressText">0/30 lessons completed</div>

    <div class="row">
        <!-- MODULES SIDEBAR -->
        <div class="col-md-4">
            <h5 class="mb-3">📚 Course Modules</h5>
            <div class="modules-container" id="modulesContainer">
                <!-- Modules will be generated by JavaScript -->
            </div>
        </div>

        <!-- LESSON DISPLAY -->
        <div class="col-md-8">
            <div class="progress-container mb-4">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0/30 lessons completed</div>
            </div>
            <div class="lesson-display" id="lessonDisplay">
                <h4 id="lessonTitle">Lesson Title</h4>
                <div id="lessonContent">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>


<!-- PAYMENT MODAL -->
<div id="paymentModal" class="payment-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Enroll in Java Course</h2>
            <span class="close" onclick="closePaymentModal()">&times;</span>
        </div>

        <div class="price-display">
            Course Price: <strong>₹499</strong> / One-time payment
        </div>

        <div class="payment-methods">
            <h5>Select Payment Method:</h5>
            <label class="payment-method">
                <input type="radio" name="payment" value="credit" checked onchange="selectPayment('credit')">
                💳 Credit Card
            </label>
            <label class="payment-method">
                <input type="radio" name="payment" value="debit" onchange="selectPayment('debit')">
                🏦 Debit Card
            </label>
            <label class="payment-method">
                <input type="radio" name="payment" value="upi" onchange="selectPayment('upi')">
                📱 UPI
            </label>
            <label class="payment-method">
                <input type="radio" name="payment" value="netbanking" onchange="selectPayment('netbanking')">
                🏧 Net Banking
            </label>
        </div>

        <div id="paymentForm"></div>
        <button class="pay-button" onclick="processPayment()">Complete Payment</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const javaModules = [
        {
            title: "Java Fundamentals",
            lessons: [
                {title: "Introduction to Java", content: "Introduction to Java\n- History of Java\n- Features and advantages\n- JDK, JRE, JVM explained\n- Setting up Java environment\n- Your first Java program"},
                {title: "Variables & Data Types", content: "Variables & Data Types\n- Primitive types: int, float, double, boolean\n- Variables and naming conventions\n- Type casting\n- Constants and final keyword\n- String class basics"},
                {title: "Operators", content: "Operators\n- Arithmetic operators\n- Comparison operators\n- Logical operators\n- Assignment operators\n- Bitwise operators"},
                {title: "Control Flow - Conditional", content: "Control Flow - Conditional\n- if, else if, else statements\n- Switch case statements\n- Ternary operator\n- Best practices\n- Common pitfalls"},
                {title: "Control Flow - Loops", content: "Control Flow - Loops\n- for loops\n- while and do-while loops\n- Enhanced for loop\n- break and continue\n- Nested loops"},
                {title: "Methods - Part 1", content: "Methods - Part 1\n- Method declaration and definition\n- Parameters and return types\n- Method overloading\n- Variable arguments (varargs)\n- Recursion basics"},
                {title: "Methods - Part 2", content: "Methods - Part 2\n- Method access modifiers\n- Static methods\n- Method best practices\n- Documentation with Javadoc\n- Testing methods"},
                {title: "Array Basics", content: "Array Basics\n- Arrays declaration and initialization\n- Accessing array elements\n- Array length\n- Multi-dimensional arrays\n- Array limitations"}
            ]
        },
        {
            title: "Object-Oriented Programming",
            lessons: [
                {title: "String Handling", content: "String Handling\n- String creation\n- String methods\n- String immutability\n- StringBuilder and StringBuffer\n- String comparison"},
                {title: "Classes & Objects - Part 1", content: "Classes & Objects - Part 1\n- Class declaration\n- Fields and methods\n- Constructors\n- this keyword\n- Object creation"},
                {title: "Classes & Objects - Part 2", content: "Classes & Objects - Part 2\n- Access modifiers: public, private, protected\n- Getters and setters\n- Static variables\n- Instance vs static\n- Class methods"},
                {title: "OOP Concepts", content: "Object-Oriented Programming\n- Abstraction\n- Encapsulation\n- Inheritance\n- Polymorphism\n- Composition"},
                {title: "Inheritance - Part 1", content: "Inheritance - Part 1\n- Extends keyword\n- Super keyword\n- Method overriding\n- Access modifiers in inheritance\n- Method resolution order"},
                {title: "Inheritance - Part 2", content: "Inheritance - Part 2\n- Constructor chaining\n- Calling parent constructors\n- Object class methods\n- instanceof operator\n- Type casting"},
                {title: "Interfaces - Part 1", content: "Interfaces - Part 1\n- Interface declaration\n- Implementing interfaces\n- Interface methods\n- Default methods\n- Multiple inheritance"},
                {title: "Interfaces - Part 2", content: "Interfaces - Part 2\n- Static methods in interfaces\n- Comparable and Comparator\n- Functional interfaces\n- Marker interfaces\n- Best practices"}
            ]
        },
        {
            title: "Advanced Java",
            lessons: [
                {title: "Packages & Import", content: "Packages & Import\n- Package naming conventions\n- Creating packages\n- Import statements\n- Static imports\n- Package access control"},
                {title: "Exception Handling - Part 1", content: "Exception Handling - Part 1\n- try, catch, finally blocks\n- Exception hierarchy\n- Checked vs unchecked exceptions\n- Multiple catch blocks\n- Resource management"},
                {title: "Exception Handling - Part 2", content: "Exception Handling - Part 2\n- throw and throws keywords\n- Custom exceptions\n- Try with resources\n- Best practices\n- Common exceptions"},
                {title: "Collections Framework - Part 1", content: "Collections Framework - Part 1\n- ArrayList vs Array\n- LinkedList\n- HashSet\n- TreeSet\n- Collection interface"},
                {title: "Collections Framework - Part 2", content: "Collections Framework - Part 2\n- HashMap and Hashtable\n- TreeMap\n- Collections utility class\n- Iterators\n- Generics basics"},
                {title: "Generics", content: "Generics\n- Generic classes\n- Generic methods\n- Bounded type parameters\n- Wildcards\n- Type erasure"},
                {title: "Lambda Expressions", content: "Lambda Expressions\n- Functional programming concepts\n- Lambda syntax\n- Functional interfaces\n- Method references\n- Streams introduction"},
                {title: "Streams API", content: "Streams API\n- Creating streams\n- Intermediate operations\n- Terminal operations\n- map, filter, reduce\n- Parallel streams"}
            ]
        },
        {
            title: "Java Applications",
            lessons: [
                {title: "File I/O", content: "File I/O\n- File class\n- FileReader and FileWriter\n- BufferedReader and BufferedWriter\n- try with resources\n- File operations"},
                {title: "Serialization", content: "Serialization\n- Serializable interface\n- ObjectInputStream and ObjectOutputStream\n- Serialization process\n- Deserialization\n- Common issues"},
                {title: "Multithreading - Part 1", content: "Multithreading - Part 1\n- Thread class and Runnable\n- Creating threads\n- Thread lifecycle\n- Thread states\n- Naming threads"},
                {title: "Multithreading - Part 2", content: "Multithreading - Part 2\n- Synchronization\n- Lock and Semaphore\n- Deadlock prevention\n- Thread communication\n- Best practices"},
                {title: "Database Connectivity", content: "Database Connectivity\n- JDBC basics\n- Database connections\n- Statements and PreparedStatements\n- ResultSet\n- Connection pooling"},
                {title: "Review & Project", content: "Review & Project\n- Best practices summary\n- Design patterns overview\n- Code optimization\n- Debugging techniques\n- Next steps in Java"}
            ]
        }
    ];

    let completedLessons = JSON.parse(localStorage.getItem('javaProgress') || '[]');

    function openPaymentModal() {
        document.getElementById('paymentModal').classList.add('show');
        selectPayment('credit');
    }

    function closePaymentModal() {
        document.getElementById('paymentModal').classList.remove('show');
    }

    function selectPayment(method) {
        const form = document.getElementById('paymentForm');
        if (method === 'credit') {
            form.innerHTML = `
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="Enter name on card" required>
                </div>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" placeholder="123" maxlength="3" required>
                    </div>
                </div>
            `;
        } else if (method === 'debit') {
            form.innerHTML = `
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" placeholder="Enter name on card" required>
                </div>
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" placeholder="123" maxlength="3" required>
                    </div>
                </div>
            `;
        } else if (method === 'upi') {
            form.innerHTML = `
                <div class="form-group">
                    <label>UPI ID</label>
                    <input type="text" placeholder="yourname@bank" required>
                </div>
                <div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;">
                    <p style="margin: 0; color: #666;">Click "Complete Payment" to proceed with UPI verification</p>
                </div>
            `;
        } else if (method === 'netbanking') {
            form.innerHTML = `
                <div class="form-group">
                    <label>Select Bank</label>
                    <select style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
                        <option>Choose your bank</option>
                        <option>State Bank of India (SBI)</option>
                        <option>HDFC Bank</option>
                        <option>ICICI Bank</option>
                        <option>Axis Bank</option>
                        <option>Punjab National Bank</option>
                    </select>
                </div>
                <div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;">
                    <p style="margin: 0; color: #666;">You will be redirected to your bank's website</p>
                </div>
            `;
        }
    }

    function processPayment() {
        const selectedMethod = document.querySelector('input[name="payment"]:checked').value;
        alert(`✅ Payment of ₹499 processed via ${selectedMethod.toUpperCase()}!\n\nCourse access activated. Enjoy your learning!`);
        closePaymentModal();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('paymentModal');
        if (event.target == modal) {
            closePaymentModal();
        }
    }

    function loadModules() {
        const container = document.getElementById('modulesContainer');
        javaModules.forEach((module, moduleIndex) => {
            const moduleDiv = document.createElement('div');
            moduleDiv.className = 'module-card';
            moduleDiv.innerHTML = `
                <div class="module-header" onclick="toggleModule(${moduleIndex})">
                    <h6>${module.title}</h6>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="lessons-container" id="lessons-${moduleIndex}" style="display: none;">
                    ${module.lessons.map((lesson, lessonIndex) => `
                        <button class="lesson-btn ${completedLessons.includes(`${moduleIndex}-${lessonIndex}`) ? 'completed' : ''}" onclick="loadLesson(${moduleIndex}, ${lessonIndex})">
                            ${lesson.title}
                        </button>
                    `).join('')}
                </div>
            `;
            container.appendChild(moduleDiv);
        });
    }

    function toggleModule(moduleIndex) {
        const lessonsDiv = document.getElementById(`lessons-${moduleIndex}`);
        const icon = lessonsDiv.previousElementSibling.querySelector('.toggle-icon');
        if (lessonsDiv.style.display === 'none') {
            lessonsDiv.style.display = 'block';
            icon.textContent = '▼';
        } else {
            lessonsDiv.style.display = 'none';
            icon.textContent = '▶';
        }
    }

    function loadLesson(moduleIndex, lessonIndex) {
        const lesson = javaModules[moduleIndex].lessons[lessonIndex];
        document.getElementById('lessonTitle').textContent = lesson.title;
        document.getElementById('lessonContent').innerHTML = lesson.content.replace(/\n/g, '<br>');
        
        // Mark as completed
        const lessonId = `${moduleIndex}-${lessonIndex}`;
        if (!completedLessons.includes(lessonId)) {
            completedLessons.push(lessonId);
            localStorage.setItem('javaProgress', JSON.stringify(completedLessons));
            updateProgress();
            // Update button
            const btn = document.querySelector(`[onclick="loadLesson(${moduleIndex}, ${lessonIndex})"]`);
            btn.classList.add('completed');
        }
    }

    function updateProgress() {
        const totalLessons = javaModules.reduce((sum, module) => sum + module.lessons.length, 0);
        const progressPercent = (completedLessons.length / totalLessons) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        document.getElementById('progressText').textContent = `${completedLessons.length}/${totalLessons} lessons completed`;
    }

    loadModules();
    updateProgress();
    loadLesson(0, 0);
</script>
</body>
</html>
