<!DOCTYPE html>
<html>
<head>
    <title>DSA - Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .modules-container {
            background: #f9f9f9;
            border-radius: 12px;
            border: 3px solid #f59e0b;
            max-height: 600px;
            overflow-y: auto;
        }
        .module-card {
            margin: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .module-header {
            padding: 15px;
            background: #f59e0b;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .module-header:hover {
            background: #e08e0b;
        }
        .toggle-icon {
            font-size: 18px;
            transition: transform 0.3s ease;
        }
        .lessons-container {
            padding: 15px;
        }
        .lesson-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid #f59e0b;
            color: #f59e0b;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .lesson-btn:hover {
            background: #fef3c7;
            transform: translateX(5px);
        }
        .lesson-btn.completed {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        .progress-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-weight: bold;
        }
        .lesson-display {
            background: white;
            border-radius: 8px;
            padding: 25px;
            border-left: 5px solid #f59e0b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 500px;
        
            padding: 20px;
            border-left: 5px solid #f59e0b;
        }
        .notes-display h4 {
            color: #f59e0b;
            margin-bottom: 15px;
        }
        .subscribe-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .subscribe-btn:hover {
            background: #218838;
        }
        .payment-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .payment-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f59e0b;
            padding-bottom: 15px;
        }
        .modal-header h2 {
            color: #f59e0b;
            margin: 0;
        }
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #000;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .payment-methods {
            margin-bottom: 20px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .payment-method input {
            margin-right: 10px;
            width: auto;
        }
        .payment-method.selected {
            border-color: #f59e0b;
            background: #fffbf0;
        }
        .pay-button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .pay-button:hover {
            background: #218838;
        }
        .price-display {
            text-align: center;
            font-size: 18px;
            color: #f59e0b;
            margin-bottom: 20px;
            padding: 15px;
            background: #fffbf0;
            border-radius: 5px;
        }
        .price-display strong {
            font-size: 24px;
        }
    </style>
</head>
<body class="bg-light">

<!-- HEADER -->
<header class="subject-header" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
    <div class="header-container">
        <div class="header-left">
            <h3 class="academic-name">📊 Data Structures & Algorithms</h3>
        </div>
        <div class="header-right">
            <button class="subscribe-btn" onclick="openPaymentModal()">Enroll Now</button>
            <a href="/dashboard" class="btn btn-light" style="margin-left: 10px;">← Back</a>
        </div>
    </div>
</header>

<!-- CONTENT -->
<div class="container mt-5 mb-5">
    <div class="row">
        <!-- MODULES SIDEBAR -->
        <div class="col-md-4">
            <h5 class="mb-3">📚 Course Modules</h5>
            <div class="modules-container" id="modulesContainer">
                <!-- Modules will be generated by JavaScript -->
            </div>
        </div>

        <!-- LESSON DISPLAY -->
        <div class="col-md-8">
            <div class="progress-container mb-4">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0/30 lessons completed</div>
            </div>
            <div class="lesson-display" id="lessonDisplay">
                <h4 id="lessonTitle">Lesson Title</h4>
                <div id="lessonContent">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<div id="paymentModal" class="payment-modal">
    <div class="modal-content">
        <div class="modal-header"><h2>Enroll in DSA Course</h2><span class="close" onclick="closePaymentModal()">&times;</span></div>
        <div class="price-display">Course Price: <strong>₹499</strong> / One-time payment</div>
        <div class="payment-methods">
            <h5>Select Payment Method:</h5>
            <label class="payment-method"><input type="radio" name="payment" value="credit" checked onchange="selectPayment('credit')">💳 Credit Card</label>
            <label class="payment-method"><input type="radio" name="payment" value="debit" onchange="selectPayment('debit')">🏦 Debit Card</label>
            <label class="payment-method"><input type="radio" name="payment" value="upi" onchange="selectPayment('upi')">📱 UPI</label>
            <label class="payment-method"><input type="radio" name="payment" value="netbanking" onchange="selectPayment('netbanking')">🏧 Net Banking</label>
        </div>
        <div id="paymentForm"></div>
        <button class="pay-button" onclick="processPayment()">Complete Payment</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dsaModules = [
        {
            title: "Introduction to DSA",
            lessons: [
                {title: "Why Study DSA?", content: "Why Study DSA?\n- Algorithm analysis\n- Time and space complexity\n- Big O notation\n- Problem-solving skills\n- Interview preparation"},
                {title: "Big O Complexity", content: "Big O Complexity\n- O(1) - Constant time\n- O(log n) - Logarithmic\n- O(n) - Linear\n- O(n log n) - Linearithmic\n- O(n²) - Quadratic"},
                {title: "Arrays Basics", content: "Arrays Basics\n- Array structure\n- Time complexity\n- Space complexity\n- Array operations\n- Advantages and disadvantages"},
                {title: "Array Operations", content: "Array Operations\n- Insertion\n- Deletion\n- Searching\n- Traversal\n- Reverse and rotation"}
            ]
        },
        {
            title: "Linear Data Structures",
            lessons: [
                {title: "Linked Lists - Part 1", content: "Linked Lists - Part 1\n- Node structure\n- Singly linked list\n- Creating linked list\n- Insertion operations\n- Deletion operations"},
                {title: "Linked Lists - Part 2", content: "Linked Lists - Part 2\n- Traversal\n- Searching\n- Length calculation\n- Reversing\n- Detecting cycles"},
                {title: "Stacks", content: "Stacks\n- Stack concept (LIFO)\n- Stack implementation\n- Push and pop\n- Parentheses matching\n- Expression evaluation"},
                {title: "Queues", content: "Queues\n- Queue concept (FIFO)\n- Queue implementation\n- Enqueue and dequeue\n- Circular queue\n- Priority queue"}
            ]
        },
        {
            title: "Non-Linear Data Structures",
            lessons: [
                {title: "Trees Basics", content: "Trees Basics\n- Tree terminology\n- Tree types\n- Binary tree\n- Tree properties\n- Tree representations"},
                {title: "Binary Search Trees", content: "Binary Search Trees\n- BST properties\n- Insertion\n- Deletion\n- Searching\n- In-order traversal"},
                {title: "Tree Traversals", content: "Tree Traversals\n- In-order traversal\n- Pre-order traversal\n- Post-order traversal\n- Level-order traversal\n- Applications"},
                {title: "Balanced Trees", content: "Balanced Trees\n- AVL trees\n- Red-Black trees\n- Balance factor\n- Rotations\n- Self-balancing"}
            ]
        },
        {
            title: "Advanced Data Structures",
            lessons: [
                {title: "Heaps", content: "Heaps\n- Min heap and Max heap\n- Heap property\n- Heapify operation\n- Heap sort\n- Priority queues"},
                {title: "Graphs Basics", content: "Graphs Basics\n- Graph terminology\n- Directed graphs\n- Weighted graphs\n- Graph representation\n- Adjacency matrix vs list"},
                {title: "Graph Traversal - DFS", content: "Graph Traversal - DFS\n- Depth-first search\n- DFS implementation\n- Recursive DFS\n- Iterative DFS\n- Applications"},
                {title: "Graph Traversal - BFS", content: "Graph Traversal - BFS\n- Breadth-first search\n- BFS implementation\n- Queue-based approach\n- Shortest path\n- Applications"}
            ]
        },
        {
            title: "Algorithms",
            lessons: [
                {title: "Sorting Algorithms - Part 1", content: "Sorting Algorithms - Part 1\n- Bubble sort\n- Selection sort\n- Insertion sort\n- Time complexity\n- Space complexity"},
                {title: "Sorting Algorithms - Part 2", content: "Sorting Algorithms - Part 2\n- Merge sort\n- Merge operation\n- Divide and conquer\n- Time complexity O(n log n)\n- Stability"},
                {title: "Sorting Algorithms - Part 3", content: "Sorting Algorithms - Part 3\n- Quick sort\n- Partitioning\n- Pivot selection\n- Average vs worst case\n- In-place sorting"},
                {title: "Searching Algorithms", content: "Searching Algorithms\n- Linear search\n- Binary search\n- Binary search implementation\n- Conditions for binary search\n- Time complexity"}
            ]
        },
        {
            title: "Advanced Topics",
            lessons: [
                {title: "Hashing", content: "Hashing\n- Hash function\n- Hash table\n- Collision handling\n- Chaining\n- Open addressing"},
                {title: "Dynamic Programming - Part 1", content: "Dynamic Programming - Part 1\n- Memoization\n- Tabulation\n- Fibonacci example\n- Overlapping subproblems\n- Optimal substructure"},
                {title: "Dynamic Programming - Part 2", content: "Dynamic Programming - Part 2\n- 0/1 Knapsack\n- Longest common subsequence\n- Coin change problem\n- Edit distance\n- Applications"},
                {title: "Greedy Algorithms", content: "Greedy Algorithms\n- Greedy approach\n- Activity selection\n- Huffman coding\n- Fractional knapsack\n- When to use"}
            ]
        },
        {
            title: "Graph Algorithms & More",
            lessons: [
                {title: "Graph Algorithms", content: "Graph Algorithms\n- Dijkstra's algorithm\n- Bellman-Ford algorithm\n- Floyd-Warshall algorithm\n- Shortest paths\n- Applications"},
                {title: "Minimum Spanning Tree", content: "Minimum Spanning Tree\n- Kruskal's algorithm\n- Prim's algorithm\n- MST properties\n- Applications\n- Network design"},
                {title: "String Algorithms", content: "String Algorithms\n- Pattern matching\n- KMP algorithm\n- Boyer-Moore algorithm\n- Trie data structure\n- Applications"},
                {title: "Bit Manipulation", content: "Bit Manipulation\n- Bitwise operations\n- AND, OR, XOR\n- Bit shifting\n- Bit masking\n- Problem solving"}
            ]
        },
        {
            title: "Review & Interview Prep",
            lessons: [
                {title: "Advanced Topics", content: "Advanced Topics\n- Segment trees\n- Fenwick trees\n- Union-find\n- Topological sorting\n- Advanced problem solving"},
                {title: "Review & Interview Prep", content: "Review & Interview Prep\n- Common patterns\n- Problem-solving strategies\n- Practice tips\n- Interview questions\n- Career guidance"}
            ]
        }
    ];

    let completedLessons = JSON.parse(localStorage.getItem('dsaProgress') || '[]');

    function loadModules() {
        const container = document.getElementById('modulesContainer');
        dsaModules.forEach((module, moduleIndex) => {
            const moduleDiv = document.createElement('div');
            moduleDiv.className = 'module-card';
            moduleDiv.innerHTML = `
                <div class="module-header" onclick="toggleModule(${moduleIndex})">
                    <h6>${module.title}</h6>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="lessons-container" id="lessons-${moduleIndex}" style="display: none;">
                    ${module.lessons.map((lesson, lessonIndex) => `
                        <button class="lesson-btn ${completedLessons.includes(`${moduleIndex}-${lessonIndex}`) ? 'completed' : ''}" onclick="loadLesson(${moduleIndex}, ${lessonIndex})">
                            ${lesson.title}
                        </button>
                    `).join('')}
                </div>
            `;
            container.appendChild(moduleDiv);
        });
    }

    function toggleModule(moduleIndex) {
        const lessonsDiv = document.getElementById(`lessons-${moduleIndex}`);
        const icon = lessonsDiv.previousElementSibling.querySelector('.toggle-icon');
        if (lessonsDiv.style.display === 'none') {
            lessonsDiv.style.display = 'block';
            icon.textContent = '▼';
        } else {
            lessonsDiv.style.display = 'none';
            icon.textContent = '▶';
        }
    }

    function loadLesson(moduleIndex, lessonIndex) {
        const lesson = dsaModules[moduleIndex].lessons[lessonIndex];
        document.getElementById('lessonTitle').textContent = lesson.title;
        document.getElementById('lessonContent').innerHTML = lesson.content.replace(/\n/g, '<br>');
        
        // Mark as completed
        const lessonId = `${moduleIndex}-${lessonIndex}`;
        if (!completedLessons.includes(lessonId)) {
            completedLessons.push(lessonId);
            localStorage.setItem('dsaProgress', JSON.stringify(completedLessons));
            updateProgress();
            // Update button
            const btn = document.querySelector(`[onclick="loadLesson(${moduleIndex}, ${lessonIndex})"]`);
            btn.classList.add('completed');
        }
    }

    function updateProgress() {
        const totalLessons = dsaModules.reduce((sum, module) => sum + module.lessons.length, 0);
        const progressPercent = (completedLessons.length / totalLessons) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        document.getElementById('progressText').textContent = `${completedLessons.length}/${totalLessons} lessons completed`;
    }

    function openPaymentModal() {
        document.getElementById('paymentModal').classList.add('show');
        selectPayment('credit');
    }

    function closePaymentModal() {
        document.getElementById('paymentModal').classList.remove('show');
    }

    function selectPayment(method) {
        const form = document.getElementById('paymentForm');
        if (method === 'credit' || method === 'debit') {
            form.innerHTML = `<div class="form-group"><label>Cardholder Name</label><input type="text" placeholder="Enter name on card" required></div><div class="form-group"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"><div class="form-group"><label>Expiry Date</label><input type="text" placeholder="MM/YY" maxlength="5" required></div><div class="form-group"><label>CVV</label><input type="text" placeholder="123" maxlength="3" required></div></div>`;
        } else if (method === 'upi') {
            form.innerHTML = `<div class="form-group"><label>UPI ID</label><input type="text" placeholder="yourname@bank" required></div><div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;"><p style="margin: 0; color: #666;">Click "Complete Payment" to proceed with UPI verification</p></div>`;
        } else if (method === 'netbanking') {
            form.innerHTML = `<div class="form-group"><label>Select Bank</label><select style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;"><option>Choose your bank</option><option>State Bank of India (SBI)</option><option>HDFC Bank</option><option>ICICI Bank</option><option>Axis Bank</option><option>Punjab National Bank</option></select></div><div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;"><p style="margin: 0; color: #666;">You will be redirected to your bank's website</p></div>`;
        }
    }

    function processPayment() {
        const selectedMethod = document.querySelector('input[name="payment"]:checked').value;
        alert(`✅ Payment of ₹499 processed via ${selectedMethod.toUpperCase()}!\n\nCourse access activated. Enjoy your learning!`);
        closePaymentModal();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('paymentModal');
        if (event.target == modal) {
            closePaymentModal();
        }
    }

    loadModules();
    updateProgress();
    loadLesson(0, 0);
</script>
</body>
</html>
