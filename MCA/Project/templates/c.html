<!DOCTYPE html>
<html>
<head>
    <title>C - Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .modules-container {
            background: #f9f9f9;
            border-radius: 12px;
            border: 3px solid #6b7280;
            max-height: 600px;
            overflow-y: auto;
        }
        .module-card {
            margin: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .module-header {
            padding: 15px;
            background: #6b7280;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .module-header:hover {
            background: #5a6370;
        }
        .toggle-icon {
            font-size: 18px;
            transition: transform 0.3s ease;
        }
        .lessons-container {
            padding: 15px;
        }
        .lesson-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 2px solid #6b7280;
            color: #6b7280;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .lesson-btn:hover {
            background: #f3f4f6;
            transform: translateX(5px);
        }
        .lesson-btn.completed {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        .progress-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .progress-bar-bg {
            width: 100%;
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6b7280, #9ca3af);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-weight: bold;
        }
        .lesson-display {
            background: #ffffff;
            border-radius: 12px;
            border: 3px solid #6b7280;
            padding: 25px;
            min-height: 500px;
        }
        .notes-display h4 {
            color: #6b7280;
            margin-bottom: 15px;
        }
        .subscribe-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .subscribe-btn:hover {
            background: #218838;
        }
        .payment-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        .payment-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #6b7280;
            padding-bottom: 15px;
        }
        .modal-header h2 {
            color: #6b7280;
            margin: 0;
        }
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #000;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .payment-methods {
            margin-bottom: 20px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .payment-method input {
            margin-right: 10px;
            width: auto;
        }
        .payment-method.selected {
            border-color: #6b7280;
            background: #f3f4f6;
        }
        .pay-button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .pay-button:hover {
            background: #218838;
        }
        .price-display {
            text-align: center;
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 20px;
            padding: 15px;
            background: #f3f4f6;
            border-radius: 5px;
        }
        .price-display strong {
            font-size: 24px;
        }
    </style>
</head>
<body class="bg-light">

<!-- HEADER -->
<header class="subject-header" style="background: linear-gradient(135deg, #a8b9d1 0%, #6b7280 100%);">
    <div class="header-container">
        <div class="header-left">
            <h3 class="academic-name">⚙️ C Programming</h3>
        </div>
        <div class="header-right">
            <button class="subscribe-btn" onclick="openPaymentModal()">Enroll Now</button>
            <a href="/dashboard" class="btn btn-light" style="margin-left: 10px;">← Back</a>
        </div>
    </div>
</header>

<!-- CONTENT -->
<div class="container mt-5 mb-5">
    <div class="row">
        <!-- MODULES SIDEBAR -->
        <div class="col-md-4">
            <h5 class="mb-3">📚 Course Modules</h5>
            <div class="modules-container" id="modulesContainer">
                <!-- Modules will be generated by JavaScript -->
            </div>
        </div>

        <!-- LESSON DISPLAY -->
        <div class="col-md-8">
            <div class="progress-container mb-4">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0/30 lessons completed</div>
            </div>
            <div class="lesson-display" id="lessonDisplay">
                <h4 id="lessonTitle">Lesson Title</h4>
                <div id="lessonContent">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>

<div id="paymentModal" class="payment-modal">
    <div class="modal-content">
        <div class="modal-header"><h2>Enroll in C Programming Course</h2><span class="close" onclick="closePaymentModal()">&times;</span></div>
        <div class="price-display">Course Price: <strong>₹499</strong> / One-time payment</div>
        <div class="payment-methods">
            <h5>Select Payment Method:</h5>
            <label class="payment-method"><input type="radio" name="payment" value="credit" checked onchange="selectPayment('credit')">💳 Credit Card</label>
            <label class="payment-method"><input type="radio" name="payment" value="debit" onchange="selectPayment('debit')">🏦 Debit Card</label>
            <label class="payment-method"><input type="radio" name="payment" value="upi" onchange="selectPayment('upi')">📱 UPI</label>
            <label class="payment-method"><input type="radio" name="payment" value="netbanking" onchange="selectPayment('netbanking')">🏧 Net Banking</label>
        </div>
        <div id="paymentForm"></div>
        <button class="pay-button" onclick="processPayment()">Complete Payment</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const cModules = [
        {
            title: "Introduction to C",
            lessons: [
                {title: "Introduction to C", content: "Introduction to C\n- History of C\n- Features and advantages\n- Compilation process\n- First program\n- Environment setup"},
                {title: "Variables & Data Types", content: "Variables & Data Types\n- Identifiers and keywords\n- int, float, double, char\n- Type specifiers\n- Declaring variables\n- Initialization"},
                {title: "Input & Output", content: "Input & Output\n- printf() function\n- scanf() function\n- getchar() and putchar()\n- Format specifiers\n- Field width and precision"}
            ]
        },
        {
            title: "Operators & Control Flow",
            lessons: [
                {title: "Operators - Part 1", content: "Operators - Part 1\n- Arithmetic operators\n- Assignment operators\n- Compound assignment\n- Increment and decrement\n- Precedence"},
                {title: "Operators - Part 2", content: "Operators - Part 2\n- Comparison operators\n- Logical operators (&&, ||, !)\n- Bitwise operators\n- Ternary operator\n- Operator precedence"},
                {title: "Conditional Statements", content: "Conditional Statements\n- if statement\n- if-else statement\n- else if ladder\n- Nested conditionals\n- Switch case"}
            ]
        },
        {
            title: "Loops & Functions",
            lessons: [
                {title: "Loops - Part 1", content: "Loops - Part 1\n- while loop\n- do-while loop\n- Loop control\n- break statement\n- continue statement"},
                {title: "Loops - Part 2", content: "Loops - Part 2\n- for loop\n- Nested loops\n- Infinite loops\n- Loop variations\n- Practical examples"},
                {title: "Functions - Part 1", content: "Functions - Part 1\n- Function declaration\n- Function definition\n- Function call\n- Return statement\n- Function prototypes"},
                {title: "Functions - Part 2", content: "Functions - Part 2\n- Pass by value\n- Global vs local variables\n- Static variables\n- Function pointers\n- Recursion basics"}
            ]
        },
        {
            title: "Arrays & Strings",
            lessons: [
                {title: "Arrays - Part 1", content: "Arrays - Part 1\n- Array declaration\n- Array initialization\n- Accessing elements\n- Array bounds\n- Multi-dimensional arrays"},
                {title: "Arrays - Part 2", content: "Arrays - Part 2\n- 2D arrays\n- 2D array initialization\n- Passing arrays to functions\n- String arrays\n- Array operations"},
                {title: "Strings - Part 1", content: "Strings - Part 1\n- String declaration\n- String input/output\n- String functions\n- strlen(), strcpy(), strcat()\n- String comparison"},
                {title: "Strings - Part 2", content: "Strings - Part 2\n- String manipulation\n- sprintf() and sscanf()\n- String tokenization\n- Character functions\n- String processing"}
            ]
        },
        {
            title: "Pointers & Memory",
            lessons: [
                {title: "Pointers - Part 1", content: "Pointers - Part 1\n- Address operator (&)\n- Pointer declaration\n- Dereference operator (*)\n- Pointer arithmetic\n- Null pointers"},
                {title: "Pointers - Part 2", content: "Pointers - Part 2\n- Pointers and arrays\n- Pointers and strings\n- Pointer to pointer\n- Function pointers\n- Const pointers"},
                {title: "Memory Management", content: "Memory Management\n- Stack and heap\n- malloc() function\n- calloc() function\n- realloc() function\n- free() function"},
                {title: "Dynamic Arrays", content: "Dynamic Arrays\n- Allocating arrays\n- 2D dynamic arrays\n- Dynamic string arrays\n- Memory deallocation\n- Memory leaks"}
            ]
        },
        {
            title: "Structures & File I/O",
            lessons: [
                {title: "Structures - Part 1", content: "Structures - Part 1\n- Structure definition\n- Structure variables\n- Accessing members\n- Initializing structures\n- Nested structures"},
                {title: "Structures - Part 2", content: "Structures - Part 2\n- Arrays of structures\n- Pointers to structures\n- Passing structures to functions\n- Function returning structures\n- Structure alignment"},
                {title: "Unions & Enums", content: "Unions & Enums\n- Union declaration\n- Union size\n- Accessing union members\n- Enumerations\n- Enum advantages"},
                {title: "File I/O - Part 1", content: "File I/O - Part 1\n- File operations\n- fopen() function\n- File modes\n- Reading files\n- Writing files"}
            ]
        },
        {
            title: "Advanced Topics",
            lessons: [
                {title: "File I/O - Part 2", content: "File I/O - Part 2\n- fprintf() and fscanf()\n- fgetc() and fputc()\n- fgets() and fputs()\n- Random access\n- File closing"},
                {title: "Preprocessing", content: "Preprocessing\n- #include directive\n- Macro definition (#define)\n- Conditional compilation\n- Stringification\n- Token pasting"},
                {title: "Standard Library", content: "Standard Library\n- math.h functions\n- ctype.h functions\n- time.h functions\n- stdlib.h functions\n- string.h functions"},
                {title: "Bit Manipulation", content: "Bit Manipulation\n- Bitwise operators\n- Bit shifting\n- Bit masking\n- Setting/clearing bits\n- Practical applications"}
            ]
        },
        {
            title: "Data Structures & Review",
            lessons: [
                {title: "Linked Lists", content: "Linked Lists\n- Node structure\n- Creating nodes\n- Insertion\n- Deletion\n- Traversal"},
                {title: "Stacks & Queues", content: "Stacks & Queues\n- Stack using arrays\n- Stack using linked lists\n- Queue implementation\n- Applications\n- Implementation"},
                {title: "Advanced Topics", content: "Advanced Topics\n- Command-line arguments\n- Signal handling\n- Variadic functions\n- Goto statement\n- Best practices"},
                {title: "Review & Practice", content: "Review & Practice\n- Common patterns\n- Debugging techniques\n- Code optimization\n- Project examples\n- Career paths"}
            ]
        }
    ];

    let completedLessons = JSON.parse(localStorage.getItem('cProgress') || '[]');

    function loadModules() {
        const container = document.getElementById('modulesContainer');
        cModules.forEach((module, moduleIndex) => {
            const moduleDiv = document.createElement('div');
            moduleDiv.className = 'module-card';
            moduleDiv.innerHTML = `
                <div class="module-header" onclick="toggleModule(${moduleIndex})">
                    <h6>${module.title}</h6>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="lessons-container" id="lessons-${moduleIndex}" style="display: none;">
                    ${module.lessons.map((lesson, lessonIndex) => `
                        <button class="lesson-btn ${completedLessons.includes(`${moduleIndex}-${lessonIndex}`) ? 'completed' : ''}" onclick="loadLesson(${moduleIndex}, ${lessonIndex})">
                            ${lesson.title}
                        </button>
                    `).join('')}
                </div>
            `;
            container.appendChild(moduleDiv);
        });
    }

    function toggleModule(moduleIndex) {
        const lessonsDiv = document.getElementById(`lessons-${moduleIndex}`);
        const icon = lessonsDiv.previousElementSibling.querySelector('.toggle-icon');
        if (lessonsDiv.style.display === 'none') {
            lessonsDiv.style.display = 'block';
            icon.textContent = '▼';
        } else {
            lessonsDiv.style.display = 'none';
            icon.textContent = '▶';
        }
    }

    function loadLesson(moduleIndex, lessonIndex) {
        const lesson = cModules[moduleIndex].lessons[lessonIndex];
        document.getElementById('lessonTitle').textContent = lesson.title;
        document.getElementById('lessonContent').innerHTML = lesson.content.replace(/\n/g, '<br>');
        
        // Mark as completed
        const lessonId = `${moduleIndex}-${lessonIndex}`;
        if (!completedLessons.includes(lessonId)) {
            completedLessons.push(lessonId);
            localStorage.setItem('cProgress', JSON.stringify(completedLessons));
            updateProgress();
            // Update button
            const btn = document.querySelector(`[onclick="loadLesson(${moduleIndex}, ${lessonIndex})"]`);
            btn.classList.add('completed');
        }
    }

    function updateProgress() {
        const totalLessons = cModules.reduce((sum, module) => sum + module.lessons.length, 0);
        const progressPercent = (completedLessons.length / totalLessons) * 100;
        document.getElementById('progressBar').style.width = progressPercent + '%';
        document.getElementById('progressText').textContent = `${completedLessons.length}/${totalLessons} lessons completed`;
    }

    function openPaymentModal() {
        document.getElementById('paymentModal').classList.add('show');
        selectPayment('credit');
    }

    function closePaymentModal() {
        document.getElementById('paymentModal').classList.remove('show');
    }

    function selectPayment(method) {
        const form = document.getElementById('paymentForm');
        if (method === 'credit' || method === 'debit') {
            form.innerHTML = `<div class="form-group"><label>Cardholder Name</label><input type="text" placeholder="Enter name on card" required></div><div class="form-group"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"><div class="form-group"><label>Expiry Date</label><input type="text" placeholder="MM/YY" maxlength="5" required></div><div class="form-group"><label>CVV</label><input type="text" placeholder="123" maxlength="3" required></div></div>`;
        } else if (method === 'upi') {
            form.innerHTML = `<div class="form-group"><label>UPI ID</label><input type="text" placeholder="yourname@bank" required></div><div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;"><p style="margin: 0; color: #666;">Click "Complete Payment" to proceed with UPI verification</p></div>`;
        } else if (method === 'netbanking') {
            form.innerHTML = `<div class="form-group"><label>Select Bank</label><select style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;"><option>Choose your bank</option><option>State Bank of India (SBI)</option><option>HDFC Bank</option><option>ICICI Bank</option><option>Axis Bank</option><option>Punjab National Bank</option></select></div><div style="text-align: center; padding: 20px; background: #f0f5ff; border-radius: 5px; margin: 15px 0;"><p style="margin: 0; color: #666;">You will be redirected to your bank's website</p></div>`;
        }
    }

    function processPayment() {
        const selectedMethod = document.querySelector('input[name="payment"]:checked').value;
        alert(`✅ Payment of ₹499 processed via ${selectedMethod.toUpperCase()}!\n\nCourse access activated. Enjoy your learning!`);
        closePaymentModal();
    }

    window.onclick = function(event) {
        const modal = document.getElementById('paymentModal');
        if (event.target == modal) {
            closePaymentModal();
        }
    }

    loadModules();
    updateProgress();
    loadLesson(0, 0);
</script>
</body>
</html>
