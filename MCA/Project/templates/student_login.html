<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family :'Times New Roman', Times, serif;
            background: white;
        }

        /* From Uiverse.io by Smit-Prajapati - Modified for white background */
        .wrapper {
            width: 100%;
            min-height: 100vh;
            display: grid;
            place-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            z-index: -2;
            padding: 20px;
        }

        .form {
            padding: 3rem 4rem;
            display: grid;
            place-items: center;
            gap: 2rem;
            border: 1px solid transparent;
            border-image: linear-gradient(transparent, #667eea, transparent) 1;
            border-width: 0 2px 0 2px;
            background: white;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .form::before,
        .form::after {
            content: "";
            position: absolute;
            border: 1px solid transparent;
            border: inherit;
            z-index: -1;
            border-radius: 10px;
        }

        .form::before {
            inset: -1rem;
            opacity: 15%;
        }

        .form::after {
            inset: -2rem;
            opacity: 5%;
        }

        .form .title {
            color: #333;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            font-family :'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
        }

        .form .input-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(102, 126, 234, 0.05);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }

        .form .input-container svg {
            stroke: #667eea;
            width: 20px;
            height: 20px;
        }

        .form .input-container .input {
            background: none;
            border: none;
            padding: 0.5rem 0;
            color: #333;
            width: 100%;
            font-size: 1rem;
        }

        .form .input-container .input::placeholder {
            color: #999;
        }

        .form .input-container .input:focus {
            outline: none;
            color: #667eea;
        }

        .form .input-container:focus-within {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .form .input-container:focus-within svg {
            stroke: #667eea;
        }

        .form .login-button {
            width: 100%;
            position: relative;
            transition: all 0.2s ease-in-out;
            margin-top: 20px;
        }

        .form .login-button .input {
            cursor: pointer;
            padding: 1rem;
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            text-align: center;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .form .login-button .input:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            animation: flicker 0.5s infinite;
        }

        .form .login-button .input:active {
            transform: translateY(0);
        }

        .form .alert {
            width: 100%;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
        }

        .link-container {
            text-align: center;
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .link-container a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .link-container a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @keyframes flicker {
            0% {
                filter: brightness(100%);
            }
            10% {
                filter: brightness(110%);
            }
            20% {
                filter: brightness(100%);
            }
            30% {
                filter: brightness(105%);
            }
            40% {
                filter: brightness(100%);
            }
            50% {
                filter: brightness(100%);
            }
            60% {
                filter: brightness(105%);
            }
            70% {
                filter: brightness(100%);
            }
            80% {
                filter: brightness(110%);
            }
            90% {
                filter: brightness(100%);
            }
            100% {
                filter: brightness(100%);
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <form class="form" method="POST" action="{{ url_for('student_login') }}">
        <h1 class="title">Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="input-container">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input class="input" name="email" type="email" placeholder="Email Address" required>
        </div>

        <div class="input-container">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input class="input" name="password" type="password" placeholder="Password" required>
        </div>

        <div class="login-button">
            <input class="input" type="submit" value="Sign in">
        </div>

        <div class="link-container">
            <span>Don't have an account?</span>
            <a href="/register">Register</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
